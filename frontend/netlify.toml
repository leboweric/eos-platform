# Netlify configuration for React SPA

[build]
  publish = "dist"
  # Explicitly install optional dependencies before building.
  # This is required for @tailwindcss/oxide native bindings (e.g. @tailwindcss/oxide-linux-x64-gnu)
  # which Tailwind CSS v4 needs on Linux build images like Netlify's.
  # Without --include=optional, pnpm can skip the platform-specific binaries on fresh installs.
  command = "pnpm install --include=optional && pnpm run build"

[build.environment]
  NODE_VERSION = "18"
  NODE_OPTIONS = "--max-old-space-size=4096"
  # Pass Netlify's git commit SHA to Vite for Sentry release tracking
  VITE_COMMIT_REF = "$COMMIT_REF"

# SPA redirect rule - all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and cache control
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"

# Force no-cache for HTML files
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Force no-cache for JS files during development
[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"